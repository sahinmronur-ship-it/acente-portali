<!-- ✅ GitHub Gist Bulut Katmanı -->
<script>
  // ============================================================
  // GITHUB GIST AYARLARI
  // Aşağıdaki iki satırı doldurun:
  // ============================================================
  const GIST_TOKEN = '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';   // GitHub Personal Access Token (gist yetkisi)
  const GIST_ID    = 'GIST_ID_BURAYA'; // İlk çalıştırmada otomatik oluşturulur
  // ============================================================

  const GIST_FILENAME = 'acente_portali_data.json';
  let _gistIdRuntime = GIST_ID === 'GIST_ID_BURAYA' ? null : GIST_ID;

  window.GistCloud = {
    // Gist'e tüm veriyi yaz
    async save(allData) {
      try {
        const headers = {
          'Authorization': 'token ' + GIST_TOKEN,
          'Content-Type': 'application/json'
        };
        const body = {
          description: 'Acente Portalı Veri Yedegi',
          public: false,
          files: {
            [GIST_FILENAME]: { content: JSON.stringify(allData, null, 2) }
          }
        };

        if (_gistIdRuntime) {
          // Mevcut gist'i güncelle
          await fetch('https://api.github.com/gists/' + _gistIdRuntime, {
            method: 'PATCH',
            headers,
            body: JSON.stringify(body)
          });
        } else {
          // İlk sefer: yeni gist oluştur
          const res = await fetch('https://api.github.com/gists', {
            method: 'POST',
            headers,
            body: JSON.stringify(body)
          });
          const json = await res.json();
          if (json.id) {
            _gistIdRuntime = json.id;
            // Gist ID'yi localStorage'a kaydet (bir daha sormasin)
            localStorage.setItem('ap_gist_id', json.id);
            console.log('✅ Yeni Gist oluşturuldu. ID:', json.id);
          } else {
            console.warn('Gist oluşturulamadı:', json.message);
          }
        }
        return true;
      } catch(e) {
        console.warn('Gist kayıt hatası:', e.message);
        return false;
      }
    },

    // Gist'ten tüm veriyi oku
    async load() {
      const gistId = _gistIdRuntime || localStorage.getItem('ap_gist_id');
      if (!gistId) return null;
      try {
        const res = await fetch('https://api.github.com/gists/' + gistId, {
          headers: { 'Authorization': 'token ' + GIST_TOKEN }
        });
        const json = await res.json();
        const file = json.files && json.files[GIST_FILENAME];
        if (file && file.content) return JSON.parse(file.content);
      } catch(e) {
        console.warn('Gist okuma hatası:', e.message);
      }
      return null;
    },

    isConfigured() {
      return GIST_TOKEN !== 'TOKEN_BURAYA';
    }
  };

  // Sayfa açılınca kaydedilmiş gist id'yi yükle
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('ap_gist_id');
    if (saved && !_gistIdRuntime) _gistIdRuntime = saved;
    console.log('✅ GitHub Gist bulut katmanı hazır');
  });
</script>

<script>
// ============ DATA LAYER ============
// Users stored in localStorage so passwords can be changed
function getUsers() {
  return {
    'Onur': { pass: 'Master.2026', name: 'Onur', role: 'admin' }
  };
}
function saveUsers(u) { DB.set('users', u); DB._cloudSave('users', u); }

// Otomatik Gist yedekleme — her kayıtta çağrılır (debounced)
let _gistSaveTimer = null;
function scheduleGistSave() {
  if (!window.GistCloud || !window.GistCloud.isConfigured()) return;
  clearTimeout(_gistSaveTimer);
  _gistSaveTimer = setTimeout(async () => {
    const allData = {
      customers: DB.customers(),
      bookings: DB.bookings(),
      tours: DB.tours(),
      tourCategories: DB.tourCategories(),
      settings: DB.settings(),
      expenses: DB.expenses(),
      tourPrograms: DB.tourPrograms(),
      savedAt: new Date().toISOString()
    };
    const ok = await window.GistCloud.save(allData);
    const el = document.getElementById('cloudStatus');
    if (el) {
      el.textContent = ok ? '☁️ Gist Yedeklendi' : '⚠️ Yedek Hatası';
      el.style.color = ok ? '#86efac' : '#fbbf24';
    }
  }, 1500);
}

const DB = {
  // ---- Yerel okuma/yazma (localStorage) ----
  get(key, def) {
    try { return JSON.parse(localStorage.getItem('ap_'+key)) ?? def; } catch { return def; }
  },
  set(key, val) {
    localStorage.setItem('ap_'+key, JSON.stringify(val));
    scheduleGistSave(); // Her kayıtta otomatik yedekle
  },

  // ---- Tüm veriyi Gist'ten senkronize et ----
  async syncFromCloud() {
    if (!window.GistCloud || !window.GistCloud.isConfigured()) return;
    const data = await window.GistCloud.load();
    if (!data) return;
    const keys = ['customers','bookings','tours','tourCategories','settings','expenses','tourPrograms'];
    keys.forEach(key => {
      if (data[key] !== undefined) localStorage.setItem('ap_'+key, JSON.stringify(data[key]));
    });
  },

  // ---- Koleksiyon metodları ----
  customers: () => DB.get('customers', []),
  saveCustomers: (v) => DB.set('customers', v),

  bookings: () => DB.get('bookings', []),
  saveBookings: (v) => DB.set('bookings', v),

  tours: () => DB.get('tours', []),
  saveTours: (v) => DB.set('tours', v),

  tourCategories: () => DB.get('tourCategories', []),
  saveTourCategories: (v) => DB.set('tourCategories', v),

  settings: () => DB.get('settings', {
    agencyName: 'Acente Adınız', agencyAddress: 'Adres bilgisi',
    agencyPhone: '+90 xxx xxx xx xx', agencyEmail: 'info@acente.com', agencyLogo: ''
  }),
  saveSettings: (v) => DB.set('settings', v),

  session: () => DB.get('session', null),
  saveSession: (v) => DB.set('session', v),
  expenses: () => DB.get('expenses', []),
  saveExpenses: (v) => DB.set('expenses', v),
  tourPrograms: () => DB.get('tourPrograms', []),
  saveTourPrograms: (v) => DB.set('tourPrograms', v),
};

let currentUser = null;
let currentView = 'dashboard';

// ============ AUTH ============
document.getElementById('loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const USERS = getUsers();
  if (USERS[u] && USERS[u].pass === p) {
    currentUser = { username: u, ...USERS[u] };
    DB.saveSession(currentUser);
    showApp();
  } else {
    const err = document.getElementById('loginError');
    err.textContent = 'Kullanıcı adı veya şifre hatalı!';
    err.classList.remove('hidden');
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  cleanupRealtimeSync();
  DB.saveSession(null);
  currentUser = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
});

async function showApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userBadge').textContent = currentUser.name + ' (' + currentUser.role + ')';

  // Gist'ten güncel veriyi çek
  if (window.GistCloud && window.GistCloud.isConfigured()) {
    const syncBanner = document.createElement('div');
    syncBanner.id = 'syncBanner';
    syncBanner.className = 'fixed top-4 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-full shadow-lg z-[70] flex items-center gap-2 text-sm font-medium';
    syncBanner.innerHTML = '<span class="animate-spin">⏳</span> Gist verisi senkronize ediliyor...';
    document.body.appendChild(syncBanner);

    try {
      await DB.syncFromCloud();
      syncBanner.innerHTML = '✅ Senkronizasyon tamamlandı!';
      syncBanner.className = syncBanner.className.replace('bg-blue-600', 'bg-green-600');
    } catch(e) {
      syncBanner.innerHTML = '⚠️ Çevrimdışı mod — yerel veriler kullanılıyor';
      syncBanner.className = syncBanner.className.replace('bg-blue-600', 'bg-amber-500');
    }
    setTimeout(() => syncBanner.remove(), 2500);
  }

  render();
}

// Auto-login if session exists
const savedSession = DB.session();
if (savedSession && savedSession.username) {
  // Session var, ama kullanıcı hâlâ geçerli mi kontrol et
  const users = getUsers();
  if (users[savedSession.username]) {
    currentUser = savedSession;
    showApp();
  } else {
    // Geçersiz session — temizle
    DB.saveSession(null);
  }
}

// ============ NAVIGATION ============
document.querySelectorAll('.sidebar-link').forEach(link => {
  link.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    currentView = link.dataset.view;
    render();
  });
});

function render() {
  const c = document.getElementById('view-container');
  switch(currentView) {
    case 'dashboard': c.innerHTML = renderDashboard(); break;
    case 'bookings': c.innerHTML = renderBookings(); attachBookingsHandlers(); break;
    case 'tours': c.innerHTML = renderTours(); attachToursHandlers(); break;
    case 'vouchers': c.innerHTML = renderVouchers(); attachVoucherHandlers(); break;
    case 'calendar': c.innerHTML = renderCalendar(); attachCalendarHandlers(); break;
    case 'customers': c.innerHTML = renderCustomers(); attachCustomerHandlers(); break;
    case 'reports': c.innerHTML = renderReports(); attachReportHandlers(); break;
    case 'settings': c.innerHTML = renderSettings(); attachSettingsHandlers(); break;
    case 'expenses': c.innerHTML = renderExpenses(); attachExpensesHandlers(); break;
    case 'tourprograms': c.innerHTML = renderTourPrograms(); attachTourProgramHandlers(); break;
  }
}

// ============ UTILITIES ============
const fmt = (n, currency = 'TRY') => {
  const locales = { TRY: 'tr-TR', USD: 'en-US', EUR: 'de-DE' };
  return new Intl.NumberFormat(locales[currency] || 'tr-TR', { style: 'currency', currency: currency || 'TRY' }).format(n || 0);
};
const fmtDate = (d) => d ? new Date(d).toLocaleDateString('tr-TR') : '-';
const uid = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

function totalCost(b) { return (b.costs || []).reduce((s, c) => s + (parseFloat(c.amount) || 0), 0); }
function profit(b) { return (parseFloat(b.salePrice) || 0) - totalCost(b); }
function tourTotalCost(t) { return (t.costs || []).reduce((s, c) => s + (parseFloat(c.amount) || 0), 0); }
function tourProfit(t) { return (parseFloat(t.salePrice) || 0) - tourTotalCost(t); }

function openModal(html) {
  const mc = document.getElementById('modalContainer');
  mc.innerHTML = `<div class="fixed inset-0 modal-backdrop z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()"><div class="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto">${html}</div></div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }
window.closeModal = closeModal;

function toast(msg, type = 'success') {
  const t = document.createElement('div');
  const color = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
  t.className = `fixed top-4 right-4 ${color} text-white px-5 py-3 rounded-lg shadow-lg z-[60] transition-all`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ============ DASHBOARD ============
function renderDashboard() {
  const bookings = DB.bookings();
  const tours = DB.tours();
  const customers = DB.customers();
  const s = DB.settings();
  const usdRate = parseFloat(s.usdRate) || 32;
  const eurRate = parseFloat(s.eurRate) || 35;

  const confB = bookings.filter(b => b.status === 'confirmed');
  const confT = tours.filter(t => t.status === 'confirmed');

  const toTLLocal = (amount, cur) => cur==='USD'?amount*usdRate:cur==='EUR'?amount*eurRate:amount;

  const bRevTL = confB.reduce((s,b)=>s+toTLLocal(parseFloat(b.salePrice)||0, b.currency||'TRY'),0);
  const bCostTL = confB.reduce((s,b)=>s+toTLLocal(totalCost(b), b.currency||'TRY'),0);
  const tRevTL = confT.reduce((s,t)=>s+toTLLocal(parseFloat(t.salePrice)||0, t.currency||'TRY'),0);
  const tCostTL = confT.reduce((s,t)=>s+toTLLocal(tourTotalCost(t), t.currency||'TRY'),0);

  // Genel Giderler
  const expenses = DB.expenses();
  const totalExpTL = expenses.reduce((sum,e)=>sum+toTLLocal(parseFloat(e.amount)||0, e.currency||'TRY'),0);
  const nowD = new Date();
  const monthExpTL = expenses
    .filter(e=>e.date&&new Date(e.date).getMonth()===nowD.getMonth()&&new Date(e.date).getFullYear()===nowD.getFullYear())
    .reduce((sum,e)=>sum+toTLLocal(parseFloat(e.amount)||0, e.currency||'TRY'),0);

  // Gider sonrasi net kar
  const grossProfitTL = (bRevTL - bCostTL) + (tRevTL - tCostTL);
  const netProfitAfterExpTL = grossProfitTL - totalExpTL;
  const totalCiroTL = bRevTL + tRevTL;

  const now = new Date();
  const upB = bookings.filter(b=>b.checkIn&&new Date(b.checkIn)>=now).sort((a,b)=>new Date(a.checkIn)-new Date(b.checkIn)).slice(0,5);
  const upT = tours.filter(t=>t.startDate&&new Date(t.startDate)>=now).sort((a,b)=>new Date(a.startDate)-new Date(b.startDate)).slice(0,3);

  const currencies = ['TRY','USD','EUR'];
  const sym = {TRY:'₺',USD:'$',EUR:'€'};
  const curData = {};
  currencies.forEach(cur => {
    const bF = confB.filter(b=>(b.currency||'TRY')===cur);
    const tF = confT.filter(t=>(t.currency||'TRY')===cur);
    curData[cur] = {
      bR: bF.reduce((s,b)=>s+(parseFloat(b.salePrice)||0),0),
      bC: bF.reduce((s,b)=>s+totalCost(b),0),
      tR: tF.reduce((s,t)=>s+(parseFloat(t.salePrice)||0),0),
      tC: tF.reduce((s,t)=>s+tourTotalCost(t),0),
    };
  });

  return `
    <h1 class="text-2xl font-bold text-slate-800 mb-6">Dashboard</h1>

              <td>${c.phone || '-'}</td>

function attachCustomerHandlers() {
  document.getElementById('addCustomerBtn').addEventListener('click', () => openCustomerForm());
}

window.editCustomer = function(id) {
  const c = DB.customers().find(x => x.id === id);
  if (c) openCustomerForm(c);
};

window.deleteCustomer = function(id) {
  if (!confirm('Bu müşteriyi silmek istediğinize emin misiniz?')) return;
  DB.saveCustomers(DB.customers().filter(c => c.id !== id));
  toast('Müşteri silindi');
  render();
};

function openCustomerForm(c = {}) {
  openModal(`
    <div class="p-6">
      <h2 class="text-xl font-bold mb-4">${c.id ? 'Müşteri Düzenle' : 'Yeni Müşteri'}</h2>
      <form id="customerForm" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="label">Ad Soyad *</label><input name="name" class="input" value="${c.name || ''}" required></div>
          <div><label class="label">Telefon</label><input name="phone" class="input" value="${c.phone || ''}"></div>
          <div><label class="label">E-posta</label><input name="email" type="email" class="input" value="${c.email || ''}"></div>
          <div><label class="label">TC/Pasaport No</label><input name="idNumber" class="input" value="${c.idNumber || ''}"></div>
          <div class="col-span-2"><label class="label">Adres</label><input name="address" class="input" value="${c.address || ''}"></div>
          <div class="col-span-2"><label class="label">Notlar</label><textarea name="notes" class="input" rows="3">${c.notes || ''}</textarea></div>
        </div>
        <div class="flex justify-end gap-2 pt-4 border-t">
          <button type="button" class="btn-secondary" onclick="closeModal()">İptal</button>
          <button type="submit" class="btn-primary">Kaydet</button>
        </div>
      </form>
    </div>
  `);
  document.getElementById('customerForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    const customers = DB.customers();
    if (c.id) {
      const idx = customers.findIndex(x => x.id === c.id);
      customers[idx] = { ...c, ...data };
    } else {
      customers.push({ id: uid(), ...data, createdAt: new Date().toISOString() });
    }
    DB.saveCustomers(customers);
    closeModal(); toast('Müşteri kaydedildi'); render();
  });
}

let bookingSearchTerm = '';

function renderBookings() {
  const allBookings = DB.bookings();
  const bookings = bookingSearchTerm
    ? allBookings.filter(b => (b.customerName||'').toLowerCase().includes(bookingSearchTerm.toLowerCase()))
    : allBookings;
  return `
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold text-slate-800">Rezervasyonlar</h1>
      <button id="addBookingBtn" class="btn-primary">+ Yeni Rezervasyon</button>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 mb-4 flex gap-2 items-center">
      <span class="text-slate-400">🔍</span>
      <input id="bookingSearch" type="text" class="input" placeholder="Müşteri adı ile ara..." value="${bookingSearchTerm}" style="max-width:320px;">
      ${bookingSearchTerm ? `<button onclick="clearBookingSearch()" class="text-xs text-slate-500 hover:text-red-500">✕ Temizle</button><span class="text-xs text-slate-400">${bookings.length} sonuç</span>` : ''}
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
      <table class="data-table">
        <thead><tr><th>Rez. No</th><th>Müşteri</th><th>Otel</th><th>Giriş</th><th>Çıkış</th><th>Satış</th><th>Durum</th><th>İşlem</th></tr></thead>
        <tbody>
          ${bookings.length ? bookings.map(b => {
            const statusBadge = b.status === 'confirmed' ? 'badge-green' : b.status === 'cancelled' ? 'badge-red' : 'badge-yellow';
            const statusTxt = b.status === 'confirmed' ? 'Konfirme' : b.status === 'cancelled' ? 'İptal' : 'Beklemede';
            return `
              <tr>
                <td class="font-mono text-xs">${b.bookingNo}</td>
                <td class="font-medium">${b.customerName}</td>
                <td>${b.hotelName || '-'}</td>
                <td>${fmtDate(b.checkIn)}</td>
                <td>${fmtDate(b.checkOut)}</td>
                <td class="text-green-600 font-medium">${fmt(b.salePrice, b.currency)}</td>
                <td><span class="badge ${statusBadge}">${statusTxt}</span></td>
                <td>
                  <button class="text-blue-600 hover:underline text-sm mr-2" onclick="editBooking('${b.id}')">Düzenle</button>
                  <button class="text-red-600 hover:underline text-sm" onclick="deleteBooking('${b.id}')">Sil</button>
                </td>
              </tr>
            `;
          }).join('') : '<tr><td colspan="8" class="text-center text-slate-400 py-8">' + (bookingSearchTerm ? 'Arama sonucu bulunamadı' : 'Henüz rezervasyon yok') + '</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
}

function attachBookingsHandlers() {
  document.getElementById('addBookingBtn').addEventListener('click', () => openBookingForm());
  const searchInp = document.getElementById('bookingSearch');
  if (searchInp) {
    searchInp.addEventListener('input', (e) => {
      bookingSearchTerm = e.target.value;
      const vc = document.getElementById('view-container');
      vc.innerHTML = renderBookings();
      attachBookingsHandlers();
    });
    searchInp.focus();
  }
}

window.clearBookingSearch = function() {
  bookingSearchTerm = '';
  const vc = document.getElementById('view-container');
  vc.innerHTML = renderBookings();
  attachBookingsHandlers();
};

window.editBooking = function(id) {
  const b = DB.bookings().find(x => x.id === id);
  if (b) openBookingForm(b);
};

window.deleteBooking = function(id) {
  const b = DB.bookings().find(x => x.id === id);
  if (!confirm('⚠️ "' + (b?.customerName||'bu rezervasyon') + '" silinecek. Emin misiniz?')) return;
  if (!confirm('🔴 Geri alınamaz! Gerçekten silmek istiyor musunuz?')) return;
  DB.saveBookings(DB.bookings().filter(b => b.id !== id));
  toast('Rezervasyon silindi'); render();
};

          <button type="button" class="btn-secondary" onclick="closeModal()">İptal</button>
          <button type="submit" class="btn-primary">Kaydet</button>
        </div>
      </form>
    </div>
  `);

  const recalc = () => {
    const rows = document.querySelectorAll('.cost-row');
    let total = 0;
    rows.forEach(r => {
      total += parseFloat(r.querySelector('[name^="costAmount"]').value) || 0;
    });
    const sale = parseFloat(document.getElementById('salePriceInp').value) || 0;
    const currency = document.getElementById('currencySelect').value || 'TRY';
    document.getElementById('totalCostDisplay').textContent = fmt(total, currency);
    document.getElementById('netProfitDisplay').textContent = fmt(sale - total, currency);
    document.getElementById('netProfitDisplay').className = 'font-bold ' + ((sale - total) >= 0 ? 'text-blue-600' : 'text-red-600');
  };

  window.addCostRow = function() {
    const container = document.getElementById('costRows');
    const idx = container.children.length;
    const div = document.createElement('div');
    div.innerHTML = costRowHtml({ label: '', amount: 0 }, idx);
    container.appendChild(div.firstElementChild);
    attachCostRowListeners();
  };

  window.removeCostRow = function(btn) {
    btn.closest('.cost-row').remove();
    recalc();
  };

  function attachCostRowListeners() {
    document.querySelectorAll('.cost-row input').forEach(inp => {
      inp.oninput = recalc;
    });
  }
  attachCostRowListeners();
  document.getElementById('salePriceInp').oninput = recalc;
  document.getElementById('currencySelect').onchange = recalc;

  window.quickAddCustomer = function() {
    const name = prompt('Müşteri adı:');
    if (!name) return;
    const phone = prompt('Telefon (opsiyonel):') || '';
    const email = prompt('E-posta (opsiyonel):') || '';
    const customers = DB.customers();
    const newC = { id: uid(), name, phone, email, createdAt: new Date().toISOString() };
    customers.push(newC);
    DB.saveCustomers(customers);
    const sel = document.getElementById('bookingCustomer');
    const opt = document.createElement('option');
    opt.value = newC.id; opt.textContent = name + ' (' + (phone||email) + ')'; opt.selected = true;
    sel.appendChild(opt);
    toast('Müşteri eklendi');
  };

  document.getElementById('bookingForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = Object.fromEntries(fd);
    const costRows = document.querySelectorAll('.cost-row');
    const costs = [];
    costRows.forEach(r => {
      const label = r.querySelector('[name^="costLabel"]').value.trim();
      const amount = parseFloat(r.querySelector('[name^="costAmount"]').value) || 0;
      if (label) costs.push({ label, amount });
    });
    const customer = DB.customers().find(c => c.id === data.customerId);
    data.customerName = customer ? customer.name : '';
    data.customerPhone = customer ? customer.phone : '';
    data.customerEmail = customer ? customer.email : '';
    data.costs = costs;
    data.salePrice = parseFloat(data.salePrice) || 0;
    data.paxCount = parseInt(data.paxCount) || 1;
    const roomRowEls = document.querySelectorAll('.room-row');
    const rooms = [];
    roomRowEls.forEach((r, i) => {
      const guestName = r.querySelector('[name^="roomGuest"]').value.trim();
      if (guestName) rooms.push({
        guestName,
        roomType: r.querySelector('[name^="roomType"]').value.trim(),
        pax: parseInt(r.querySelector('[name^="roomPax"]').value) || 1

    });
    data.rooms = rooms;

    const bookings = DB.bookings();
    if (b.id) {
      const idx = bookings.findIndex(x => x.id === b.id);
      bookings[idx] = { ...b, ...data };
    } else {
      bookings.push({ id: uid(), ...data, createdAt: new Date().toISOString() });
    }
    DB.saveBookings(bookings);
    closeModal(); toast('Rezervasyon kaydedildi'); render();
  });
}

// ============ PDF FONT HELPERS ============
// jsPDF built-in fonts (helvetica) do NOT support Turkish/special chars.
// pdfSafe() converts Turkish chars to ASCII for PDF output only.
// Browser display stays fully Turkish/Unicode.
function pdfSafe(str) {
  if (!str) return '';
  var s = String(str);
  var map = {
    'Ğ':'G','ğ':'g','Ü':'U','ü':'u','Ş':'S','ş':'s',
    'İ':'I','ı':'i','Ö':'O','ö':'o','Ç':'C','ç':'c',
    '‘':"'",'’':"'",'“':'"','”':'"',
    '′':"'",'″':'"','´':"'",
    '–':'-','—':'-','−':'-',
    'â':'a','Â':'A','î':'i','Î':'I',
    'ô':'o','Ô':'O','û':'u','Û':'U',
    'à':'a','á':'a','è':'e','é':'e',
    'ê':'e','ë':'e','ï':'i','ù':'u',
    'ú':'u','ÿ':'y','ñ':'n','Ñ':'N',
    'ã':'a','õ':'o','å':'a','æ':'ae',
    'Æ':'AE','ø':'o','Ø':'O',
    '•':'-','…':'...',' ':' ','­':'','​':''
  };
  var result = '';
  for (var i = 0; i < s.length; i++) {
    var ch = s[i];
    var code = s.charCodeAt(i);
    if (map[ch] !== undefined) {
      result += map[ch];
    } else if (code < 128) {
      result += ch;
    } else {
      result += '?';
    }
  }
  return result;
}
function pdfWrap(doc, text, maxW) {
  return doc.splitTextToSize(pdfSafe(text||''), maxW);
}
function pdfHeader(doc, s, title, subLine) {
  doc.setFillColor(37,99,235); doc.rect(0,0,210,5,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(37,99,235);
  doc.text(pdfSafe(s.agencyName||''), 14, 18);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(90,90,90);
  doc.text(pdfSafe(s.agencyAddress||''), 14, 24);
  doc.text(pdfSafe(s.agencyPhone||'')+' | '+pdfSafe(s.agencyEmail||''), 14, 29);
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(30,41,59);
  doc.text(pdfSafe(title||''), 196, 18, {align:'right'});
  if (subLine) { doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(80,80,80); doc.text(pdfSafe(subLine), 196, 25, {align:'right'}); }
  doc.text('Date: '+new Date().toLocaleDateString('en-GB'), 196, 31, {align:'right'});
  doc.setDrawColor(37,99,235); doc.setLineWidth(0.5); doc.line(14,38,196,38);
}
function pdfFooter(doc, s) {
  doc.setDrawColor(200,200,200); doc.line(14,282,196,282);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(120,120,120);
  doc.text(pdfSafe(s.agencyName||'')+' | '+pdfSafe(s.agencyPhone||'')+' | '+pdfSafe(s.agencyEmail||''), 105, 287, {align:'center'});
}

      [t.nights, String(nights)],
      [t.room, pdfSafe(b.roomType || '-')],
      [t.board, pdfSafe(b.boardType || '-')],
    ],
    theme: 'grid',
    headStyles: { fillColor:[100,116,139], textColor:255, fontSize:9.5, font:'helvetica', fontStyle:'bold' },
    bodyStyles: { fontSize:9.5, font:'helvetica' },
    columnStyles: { 0:{ fontStyle:'bold', cellWidth:52 } },
    margin: { left:14, right:14 },
  });

  // ── ODA DETAYLARI ──────────────────────────────────────────────────────────
  if (b.rooms && b.rooms.length > 0) {
    doc.autoTable({
      startY: doc.lastAutoTable.finalY + 5,
      head: [['#', t.name, t.room, t.pax]],
      body: (b.rooms || []).map((r, i) => [String(i+1), pdfSafe(r.guestName||'-'), pdfSafe(r.roomType||b.roomType||'-'), String(r.pax||1)]),
      theme: 'grid',
      headStyles: { fillColor:[71,85,105], textColor:255, fontSize:8.5, font:'helvetica', fontStyle:'bold' },
      bodyStyles: { fontSize:8.5, font:'helvetica' },
      margin: { left:14, right:14 },
    });
  }

  // ── ONEMLI NOTLAR ──────────────────────────────────────────────────────────
  const y = doc.lastAutoTable.finalY + 10;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9.5);
  doc.setTextColor(30, 41, 59);
  doc.text(t.notes + ':', 14, y);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(80, 80, 80);
  const noteLines = [t.n1, t.n2, t.n3];
  if (b.notes) noteLines.push('- ' + pdfSafe(b.notes));
  noteLines.forEach((n, i) => doc.text(n, 14, y + 6 + (i * 5.5)));

  // ── FOOTER ─────────────────────────────────────────────────────────────────
  doc.setDrawColor(200, 200, 200);
  doc.line(14, 280, 196, 280);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.setTextColor(100, 100, 100);
  doc.text(pdfSafe(s.agencyName||'') + '  |  ' + pdfSafe(s.agencyPhone||'') + '  |  ' + pdfSafe(s.agencyEmail||''), 105, 285, { align: 'center' });
  doc.text(t.footer, 105, 291, { align: 'center' });

  doc.save('Voucher_' + pdfSafe(b.bookingNo||'') + '_' + lang.toUpperCase() + '.pdf');
  toast('Voucher PDF indirildi (' + lang.toUpperCase() + ')');
};

// ============ CALENDAR ============
let calendarMonth = new Date().getMonth();
let calendarYear = new Date().getFullYear();

function renderCalendar() {
  const monthNames = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const dayNames = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  const firstDay = new Date(calendarYear, calendarMonth, 1);
  const lastDay = new Date(calendarYear, calendarMonth + 1, 0);
  let startWeekday = firstDay.getDay() - 1; if (startWeekday < 0) startWeekday = 6;

  const bookings = DB.bookings().filter(b => b.status !== 'cancelled' && b.checkIn && b.checkOut);
  const tours = DB.tours().filter(t => t.status !== 'cancelled' && t.startDate);
  const todayStr = new Date().toISOString().split('T')[0];

  const cells = [];
  const prevLastDay = new Date(calendarYear, calendarMonth, 0).getDate();
  for (let i = startWeekday - 1; i >= 0; i--) cells.push({ day: prevLastDay - i, other: true });

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dateStr = new Date(calendarYear, calendarMonth, d).toISOString().split('T')[0];
    const bookingEvents = [];
    bookings.forEach(b => {
      const ci = new Date(b.checkIn).toISOString().split('T')[0];
      const co = new Date(b.checkOut).toISOString().split('T')[0];
      if (dateStr === ci) bookingEvents.push({ type: 'in', label: b.customerName || 'Müşteri', id: b.id, hotel: b.hotelName });
      else if (dateStr === co) bookingEvents.push({ type: 'out', label: b.customerName || 'Müşteri', id: b.id, hotel: b.hotelName });
      else if (dateStr > ci && dateStr < co) bookingEvents.push({ type: 'stay', label: b.customerName || 'Müşteri', id: b.id, hotel: b.hotelName });
    });
    const tourEvents = [];
    tours.forEach(t => {
      const sd = new Date(t.startDate).toISOString().split('T')[0];
      const ed = t.endDate ? new Date(t.endDate).toISOString().split('T')[0] : sd;
      if (dateStr === sd && dateStr === ed) tourEvents.push({ type: 'ts', label: t.tourName, id: t.id });
      else if (dateStr === sd) tourEvents.push({ type: 'ts', label: t.tourName, id: t.id });
      else if (dateStr === ed) tourEvents.push({ type: 'te', label: t.tourName, id: t.id });
      else if (dateStr > sd && dateStr < ed) tourEvents.push({ type: 'tmid', label: t.tourName, id: t.id });
    });
    cells.push({ day: d, other: false, bookingEvents, tourEvents, dateStr, isToday: dateStr === todayStr });
  }
  const remaining = (7 - (cells.length % 7)) % 7;
  for (let i = 1; i <= remaining; i++) cells.push({ day: i, other: true });

  // Build event lists for bottom panel
  const allBookingEvts = [];
  const allTourEvts = [];
  bookings.forEach(b => {
    const ci = new Date(b.checkIn).toISOString().split('T')[0];
    const co = new Date(b.checkOut).toISOString().split('T')[0];
    const ciDate = new Date(calendarYear, calendarMonth);
    const lastDate = new Date(calendarYear, calendarMonth+1, 0);
    const ciStr = new Date(calendarYear, calendarMonth, 1).toISOString().split('T')[0];
    if (ci >= ciStr.slice(0,7) || co >= ciStr.slice(0,7)) {
      allBookingEvts.push({ ...b, ci, co });
    }
  });
  tours.forEach(t => {
    const sd = new Date(t.startDate).toISOString().split('T')[0];
    const ed = t.endDate ? new Date(t.endDate).toISOString().split('T')[0] : sd;
    allTourEvts.push({ ...t, sd, ed });
  });

  const calCells = cells.map((c, idx) => {
    const dow = idx % 7;
    if (c.other) {
      return `<div style="border:1px solid #e2e8f0;padding:3px;min-height:64px;background:#f8fafc;opacity:.4;"><span style="font-size:11px;color:#94a3b8;">${c.day}</span></div>`;
    }
    let bg = '#fff'; if (c.isToday) bg = '#eff6ff'; else if (dow >= 5) bg = '#fafafa';
    const dayNumHtml = c.isToday
      ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:#2563eb;color:#fff;border-radius:50%;font-size:10px;font-weight:700;">${c.day}</span>`
      : `<span style="font-size:11px;font-weight:600;color:${dow>=5?'#94a3b8':'#374151'};">${c.day}</span>`;

    // Compact event chips
    const bHtml = (c.bookingEvents||[]).slice(0,2).map(e => {
      const colors = { in: '#bfdbfe|#1e3a8a', out: '#fde68a|#78350f', stay: '#dbeafe|#1e40af' };
      const [bg2, col] = (colors[e.type]||'#dbeafe|#1e40af').split('|');
      const icon = e.type==='in'?'🏨':e.type==='out'?'🚪':'🛏';
      return `<div onclick="editBooking('${e.id}')" title="${icon} ${e.label} — ${e.hotel||''}
${e.type==='in'?'Giriş':e.type==='out'?'Çıkış':'Konaklama'}" style="background:${bg2};color:${col};border-radius:3px;padding:1px 3px;margin-bottom:1px;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:flex;align-items:center;gap:2px;"><span>${icon}</span><span style="overflow:hidden;text-overflow:ellipsis;">${e.label}</span></div>`;
    }).join('');

    const tHtml = (c.tourEvents||[]).slice(0,2).map(e => {
      const tColors = { ts:'#a7f3d0|#065f46', te:'#fecaca|#7f1d1d', tmid:'#d1fae5|#065f46' };
      const [bg2, col] = (tColors[e.type]||'#d1fae5|#065f46').split('|');
      const icon = e.type==='ts'?'✈️':e.type==='te'?'🏁':'🗺';
      const borderL = e.type==='tmid'?'border-left:2px solid #10b981;':'';
      return `<div onclick="editTour('${e.id}')" title="${icon} ${e.label}
${e.type==='ts'?'Tur Başlangıç':e.type==='te'?'Tur Bitiş':'Tur Devam'}" style="background:${bg2};color:${col};border-radius:3px;padding:1px 3px;margin-bottom:1px;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:flex;align-items:center;gap:2px;${borderL}"><span>${icon}</span><span style="overflow:hidden;text-overflow:ellipsis;">${e.label}</span></div>`;
    }).join('');

    const totalEvt = (c.bookingEvents||[]).length + (c.tourEvents||[]).length;
    const more = totalEvt > 4 ? `<div style="font-size:8px;color:#94a3b8;">+${totalEvt-4}</div>` : '';

    return `<div style="border:1px solid ${c.isToday?'#93c5fd':'#e2e8f0'};padding:3px;min-height:64px;background:${bg};position:relative;">
      <div style="margin-bottom:2px;">${dayNumHtml}</div>
      ${bHtml}${tHtml}${more}
    </div>`;
  }).join('');

  // Build the bottom event list for this month
  const monthStr = `${calendarYear}-${String(calendarMonth+1).padStart(2,'0')}`;
  const monthBookings = bookings.filter(b => {
    const ci = new Date(b.checkIn).toISOString().split('T')[0];
    const co = new Date(b.checkOut).toISOString().split('T')[0];
    return ci.startsWith(monthStr) || co.startsWith(monthStr);
  }).sort((a,b) => new Date(a.checkIn) - new Date(b.checkIn));
  const monthTours = tours.filter(t => {
    const sd = new Date(t.startDate).toISOString().split('T')[0];
    return sd.startsWith(monthStr) || (t.endDate && new Date(t.endDate).toISOString().split('T')[0].startsWith(monthStr));
  }).sort((a,b) => new Date(a.startDate) - new Date(b.startDate));

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <h1 class="text-2xl font-bold text-slate-800">Takvim</h1>
      <div style="display:flex;align-items:center;gap:8px;">
        <button onclick="prevMonth()" class="btn-secondary">‹</button>
        <span style="font-size:16px;font-weight:600;padding:0 12px;">${monthNames[calendarMonth]} ${calendarYear}</span>
        <button onclick="nextMonth()" class="btn-secondary">›</button>
        <button onclick="todayCal()" class="btn-primary">Bugün</button>
      </div>
    </div>

    <!-- Legend -->
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;font-size:11px;color:#475569;">
      <span style="display:inline-flex;align-items:center;gap:4px;"><span>🏨</span> Giriş</span>
      <span style="display:inline-flex;align-items:center;gap:4px;"><span>🚪</span> Çıkış</span>
      <span style="display:inline-flex;align-items:center;gap:4px;"><span>🛏</span> Konaklama</span>
      <span style="display:inline-flex;align-items:center;gap:4px;"><span>✈️</span> Tur Başlangıç</span>
      <span style="display:inline-flex;align-items:center;gap:4px;"><span>🏁</span> Tur Bitiş</span>
      <span style="display:inline-flex;align-items:center;gap:4px;"><span>🗺</span> Tur Devam</span>
      <span style="font-size:10px;color:#94a3b8;">(Üzerine gelin: detay, tıklayın: düzenle)</span>
    </div>

    <!-- Calendar Grid -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 mb-6">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;">
        ${dayNames.map((d,i)=>`<div style="text-align:center;padding:6px;font-size:11px;font-weight:700;color:#475569;background:${i>=5?'#e2e8f0':'#f1f5f9'};">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);">
        ${calCells}
      </div>
    </div>

    <!-- Bottom event lists -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
        <h3 style="font-weight:600;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px;">🏨 ${monthNames[calendarMonth]} Rezervasyonları <span style="font-size:11px;font-weight:400;color:#94a3b8;">(${monthBookings.length})</span></h3>
        ${monthBookings.length ? `<div style="display:flex;flex-direction:column;gap:6px;">
          ${monthBookings.map(b => `
            <div onclick="editBooking('${b.id}')" style="padding:8px;background:#f8fafc;border-radius:8px;cursor:pointer;border-left:3px solid #3b82f6;" title="Düzenlemek için tıklayın">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-weight:600;font-size:12px;">🏨 ${b.customerName||'-'}</span>
                <span style="font-size:10px;padding:1px 6px;border-radius:999px;background:${b.status==='confirmed'?'#dcfce7':'#fef9c3'};color:${b.status==='confirmed'?'#166534':'#854d0e'};">${b.status==='confirmed'?'Konfirme':'Beklemede'}</span>
              </div>
              <div style="font-size:11px;color:#64748b;margin-top:2px;">${b.hotelName||''} • ${fmtDate(b.checkIn)} → ${fmtDate(b.checkOut)}</div>
            </div>
          `).join('')}
        </div>` : '<p style="font-size:12px;color:#94a3b8;">Bu ay rezervasyon yok.</p>'}
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
        <h3 style="font-weight:600;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px;">✈️ ${monthNames[calendarMonth]} Turları <span style="font-size:11px;font-weight:400;color:#94a3b8;">(${monthTours.length})</span></h3>
        ${monthTours.length ? `<div style="display:flex;flex-direction:column;gap:6px;">
          ${monthTours.map(t => `
            <div onclick="editTour('${t.id}')" style="padding:8px;background:#f0fdf4;border-radius:8px;cursor:pointer;border-left:3px solid #10b981;" title="Düzenlemek için tıklayın">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-weight:600;font-size:12px;">✈️ ${t.tourName}</span>
                <span style="font-size:10px;padding:1px 6px;border-radius:999px;background:${t.status==='confirmed'?'#dcfce7':'#fef9c3'};color:${t.status==='confirmed'?'#166534':'#854d0e'};">${t.status==='confirmed'?'Konfirme':'Beklemede'}</span>
              </div>
              <div style="font-size:11px;color:#64748b;margin-top:2px;">${fmtDate(t.startDate)}${t.endDate?' → '+fmtDate(t.endDate):''} • ${(t.participants||[]).length} kişi</div>
            </div>
          `).join('')}
        </div>` : '<p style="font-size:12px;color:#94a3b8;">Bu ay tur yok.</p>'}
      </div>
    </div>
  `;
}

function attachCalendarHandlers() {}
window.prevMonth = function() { calendarMonth--; if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; } render(); };
window.nextMonth = function() { calendarMonth++; if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; } render(); };
window.todayCal = function() { calendarMonth = new Date().getMonth(); calendarYear = new Date().getFullYear(); render(); };

// ============ REPORTS ============
let reportTab = 'bookings';

function toTL(amount, cur) {
  const s = DB.settings();
  if (cur === 'USD') return amount * (parseFloat(s.usdRate) || 32);
  if (cur === 'EUR') return amount * (parseFloat(s.eurRate) || 35);
  return amount;
}

function renderReports() {
  const allBookings = DB.bookings();
  const allTours = DB.tours();
  const today = new Date();
  const cats = DB.tourCategories();

  const confB = allBookings.filter(b => b.status === 'confirmed');
  const confT = allTours.filter(t => t.status === 'confirmed');

  const thisMonthB = allBookings.filter(b => b.createdAt && new Date(b.createdAt).getMonth() === today.getMonth() && new Date(b.createdAt).getFullYear() === today.getFullYear());
  const thisMonthT = allTours.filter(t => t.createdAt && new Date(t.createdAt).getMonth() === today.getMonth() && new Date(t.createdAt).getFullYear() === today.getFullYear());

  const bRevTL = confB.reduce((s, b) => s + toTL(parseFloat(b.salePrice)||0, b.currency||'TRY'), 0);
  const bCostTL = confB.reduce((s, b) => s + toTL(totalCost(b), b.currency||'TRY'), 0);
  const tRevTL = confT.reduce((s, t) => s + toTL(parseFloat(t.salePrice)||0, t.currency||'TRY'), 0);
  const tCostTL = confT.reduce((s, t) => s + toTL(tourTotalCost(t), t.currency||'TRY'), 0);

  const currencies = ['TRY', 'USD', 'EUR'];
  const sym = { TRY: '₺', USD: '$', EUR: '€' };

  const isB = reportTab === 'bookings';

  const bRows = confB.map(b => {
    const cat = '';
    return `<tr>
      <td class="font-mono text-xs">${b.bookingNo}</td>
      <td class="font-medium">${b.customerName || '-'}</td>
      <td>${b.hotelName || '-'}</td>
      <td class="text-xs">${fmtDate(b.checkIn)}</td>
      <td class="text-green-600 font-medium">${fmt(b.salePrice, b.currency)}</td>
      <td><span class="badge badge-blue">${b.currency || 'TRY'}</span></td>
      <td><button class="text-blue-600 hover:underline text-xs font-medium" onclick="showBookingDetail('${b.id}')">Detay →</button></td>
    </tr>`;
  }).join('');

  const tRows = confT.map(t => {
    const cat = cats.find(c => c.id === t.categoryId);
    return `<tr>
      <td class="font-medium">${t.tourName}</td>
      <td>${cat ? cat.name : '-'}</td>
      <td class="text-xs">${fmtDate(t.startDate)}${t.endDate ? ' → ' + fmtDate(t.endDate) : ''}</td>
      <td class="text-center">${(t.participants||[]).length}</td>
      <td class="text-green-600 font-medium">${fmt(t.salePrice || 0, t.currency)}</td>
      <td><span class="badge badge-blue">${t.currency || 'TRY'}</span></td>
      <td><button class="text-blue-600 hover:underline text-xs font-medium" onclick="showTourDetail('${t.id}')">Detay →</button></td>
    </tr>`;
  }).join('');

  const s = DB.settings();

  return `
    <div class="flex justify-between items-center mb-6" style="flex-wrap:wrap;gap:8px;">
      <h1 class="text-2xl font-bold text-slate-800">Satış Raporu</h1>
      <div class="flex gap-2" style="flex-wrap:wrap;">
        <button onclick="exportReportExcel()" class="btn-success">📊 Excel İndir</button>
        <button onclick="exportReportPDF()" class="btn-primary">📄 PDF İndir</button>
      </div>
    </div>

    <!-- Summary cards -->
    <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
      <div class="stat-card"><p class="text-slate-500 text-sm">Bu Ay Rez.</p><p class="text-3xl font-bold text-slate-800 mt-1">${thisMonthB.length}</p></div>
      <div class="stat-card"><p class="text-slate-500 text-sm">Bu Ay Tur</p><p class="text-3xl font-bold text-slate-800 mt-1">${thisMonthT.length}</p></div>
      <div class="stat-card"><p class="text-slate-500 text-sm">Rez. Ciro (TL)</p><p class="text-2xl font-bold text-green-600 mt-1">${fmt(bRevTL)}</p></div>
      <div class="stat-card"><p class="text-slate-500 text-sm">Tur Ciro (TL)</p><p class="text-2xl font-bold text-green-600 mt-1">${fmt(tRevTL)}</p></div>
      <div class="stat-card"><p class="text-slate-500 text-sm">Toplam Net Kâr (TL)</p><p class="text-2xl font-bold mt-1 ${(bRevTL-bCostTL+tRevTL-tCostTL)>=0?'text-blue-600':'text-red-600'}">${fmt(bRevTL-bCostTL+tRevTL-tCostTL)}</p></div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
      <h3 class="font-semibold text-slate-800 mb-3">💱 Döviz Bazlı Ciro <span class="text-xs font-normal text-slate-500">(1$=${s.usdRate||32}₺ · 1€=${s.eurRate||35}₺ — Ayarlar'dan güncelleyebilirsiniz)</span></h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        ${currencies.map(cur => {
          const bF = confB.filter(b => (b.currency||'TRY') === cur);
          const tF = confT.filter(t => (t.currency||'TRY') === cur);
          const bR = bF.reduce((s,b)=>s+(parseFloat(b.salePrice)||0),0);
          const bC = bF.reduce((s,b)=>s+totalCost(b),0);
          const tR = tF.reduce((s,t)=>s+(parseFloat(t.salePrice)||0),0);
          const tC = tF.reduce((s,t)=>s+tourTotalCost(t),0);
          const total = bR+tR, totalC = bC+tC, p = total - totalC;
          const tlEq = toTL(Math.abs(p), cur);
          return `<div class="border border-slate-200 rounded-xl p-4">
            <div class="flex justify-between items-center mb-3">

function renderMonthlyReport(confB, confT) {
  const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const year = new Date().getFullYear();
  const rows = months.map((mName, mi) => {
    const bm = confB.filter(b => b.createdAt && new Date(b.createdAt).getFullYear()===year && new Date(b.createdAt).getMonth()===mi);
    const tm = confT.filter(t => t.createdAt && new Date(t.createdAt).getFullYear()===year && new Date(t.createdAt).getMonth()===mi);
    const bRev = bm.reduce((s,b)=>s+toTL(parseFloat(b.salePrice)||0,b.currency||'TRY'),0);
    const bCost = bm.reduce((s,b)=>s+toTL(totalCost(b),b.currency||'TRY'),0);
    const tRev = tm.reduce((s,t)=>s+toTL(parseFloat(t.salePrice)||0,t.currency||'TRY'),0);
    const tCost = tm.reduce((s,t)=>s+toTL(tourTotalCost(t),t.currency||'TRY'),0);
    const netKar = (bRev+tRev)-(bCost+tCost);
    if (bm.length===0 && tm.length===0) return '';
    return `<tr>
      <td class="font-medium">${mName} ${year}</td>
      <td class="text-center">${bm.length}</td><td class="text-center">${tm.length}</td>
      <td class="text-green-600 font-medium">${fmt(bRev+tRev)}</td>
      <td class="text-red-500">${fmt(bCost+tCost)}</td>
      <td class="font-bold ${netKar>=0?'text-blue-600':'text-red-600'}">${fmt(netKar)}</td>
      <td class="text-xs text-slate-500">${(bRev+tRev)?((netKar/(bRev+tRev))*100).toFixed(1)+'%':'-'}</td>
    </tr>`;
  }).filter(Boolean).join('');
  const totalBRev = confB.reduce((s,b)=>s+toTL(parseFloat(b.salePrice)||0,b.currency||'TRY'),0);
  const totalBCost = confB.reduce((s,b)=>s+toTL(totalCost(b),b.currency||'TRY'),0);
  const totalTRev = confT.reduce((s,t)=>s+toTL(parseFloat(t.salePrice)||0,t.currency||'TRY'),0);
  const totalTCost = confT.reduce((s,t)=>s+toTL(tourTotalCost(t),t.currency||'TRY'),0);
  const totalNet = (totalBRev+totalTRev)-(totalBCost+totalTCost);
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <h3 style="font-weight:600;">📅 ${year} Aylık Performans</h3>
    <button onclick="exportMonthlyExcel()" class="btn-success" style="font-size:12px;padding:6px 12px;">📊 Excel</button>
  </div>
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
    <table class="data-table">
      <thead><tr><th>Ay</th><th>Rez.</th><th>Tur</th><th>Toplam Ciro (TL)</th><th>Toplam Maliyet</th><th>Net Kâr</th><th>Marj</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:20px;">Bu yıl veri yok</td></tr>'}
        <tr style="background:#f1f5f9;font-weight:700;">
          <td>TOPLAM</td><td class="text-center">${confB.length}</td><td class="text-center">${confT.length}</td>
          <td class="text-green-600">${fmt(totalBRev+totalTRev)}</td><td class="text-red-500">${fmt(totalBCost+totalTCost)}</td>
          <td class="${totalNet>=0?'text-blue-600':'text-red-600'}">${fmt(totalNet)}</td>
          <td>${(totalBRev+totalTRev)?((totalNet/(totalBRev+totalTRev))*100).toFixed(1)+'%':'-'}</td>
        </tr>
      </tbody>
    </table>
  </div>`;
}

function renderYearlyReport(confB, confT) {
  const allB = DB.bookings().filter(b=>b.status==='confirmed');
  const allT = DB.tours().filter(t=>t.status==='confirmed');
  const years = [...new Set([
    ...allB.map(b=>b.createdAt?new Date(b.createdAt).getFullYear():null),
    ...allT.map(t=>t.createdAt?new Date(t.createdAt).getFullYear():null)
  ].filter(Boolean))].sort((a,b)=>a-b);
  if (!years.length) return '<p style="color:#94a3b8;padding:20px;">Henüz veri yok.</p>';
  const rows = years.map(yr => {
    const by = allB.filter(b=>b.createdAt&&new Date(b.createdAt).getFullYear()===yr);
    const ty = allT.filter(t=>t.createdAt&&new Date(t.createdAt).getFullYear()===yr);
    const bRev=by.reduce((s,b)=>s+toTL(parseFloat(b.salePrice)||0,b.currency||'TRY'),0);
    const bCost=by.reduce((s,b)=>s+toTL(totalCost(b),b.currency||'TRY'),0);
    const tRev=ty.reduce((s,t)=>s+toTL(parseFloat(t.salePrice)||0,t.currency||'TRY'),0);
    const tCost=ty.reduce((s,t)=>s+toTL(tourTotalCost(t),t.currency||'TRY'),0);
    const net=(bRev+tRev)-(bCost+tCost);
    return `<tr><td class="font-bold">${yr}</td><td class="text-center">${by.length}</td><td class="text-center">${ty.length}</td>
      <td class="text-green-600 font-medium">${fmt(bRev+tRev)}</td><td class="text-red-500">${fmt(bCost+tCost)}</td>
      <td class="font-bold ${net>=0?'text-blue-600':'text-red-600'}">${fmt(net)}</td>
      <td>${(bRev+tRev)?((net/(bRev+tRev))*100).toFixed(1)+'%':'-'}</td></tr>`;
  }).join('');
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <h3 style="font-weight:600;">📆 Yıllık Performans</h3>
    <button onclick="exportYearlyExcel()" class="btn-success" style="font-size:12px;padding:6px 12px;">📊 Excel</button>
  </div>
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
    <table class="data-table">
      <thead><tr><th>Yıl</th><th>Rez.</th><th>Tur</th><th>Toplam Ciro (TL)</th><th>Maliyet</th><th>Net Kâr</th><th>Marj</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

    const tc = totalCost(b), p = profit(b);
    return [b.bookingNo, b.customerName||'-', b.hotelName||'-', fmtDate(b.checkIn), fmtDate(b.checkOut),
      b.salePrice||0, b.currency||'TRY', tc, p, toTL(p, b.currency||'TRY'),
      b.salePrice ? ((p/b.salePrice)*100).toFixed(1)+'%' : '0%'];
  });
  const wsB = XLSX.utils.aoa_to_sheet([bHeaders, ...bRows]);
  wsB['!cols'] = [{wch:12},{wch:20},{wch:20},{wch:11},{wch:11},{wch:14},{wch:7},{wch:14},{wch:12},{wch:14},{wch:8}];
  XLSX.utils.book_append_sheet(wb, wsB, 'Rezervasyonlar');

  // Tours sheet
  const tHeaders = ['Tur Adi','Kategori','Baslangic','Bitis','Katilimci','Satis Fiyati','Doviz','Toplam Maliyet','Net Kar','Net Kar (TL)'];
  const tRows = confT.map(t => {
    const cat = cats.find(c => c.id === t.categoryId);
    const tc = tourTotalCost(t), p = tourProfit(t);
    return [t.tourName, cat?cat.name:'-', fmtDate(t.startDate), fmtDate(t.endDate)||'-',
      (t.participants||[]).length, t.salePrice||0, t.currency||'TRY', tc, p, toTL(p, t.currency||'TRY')];
  });
  const wsT = XLSX.utils.aoa_to_sheet([tHeaders, ...tRows]);
  wsT['!cols'] = [{wch:25},{wch:14},{wch:11},{wch:11},{wch:9},{wch:14},{wch:7},{wch:14},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsT, 'Turlar');

  XLSX.writeFile(wb, 'SatisRaporu_' + new Date().toISOString().split('T')[0] + '.xlsx');
  toast('Excel raporu indirildi');
};

window.exportReportPDF = function() {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  const s = DB.settings();
  const confB = DB.bookings().filter(b=>b.status==='confirmed');
  const confT = DB.tours().filter(t=>t.status==='confirmed');
  pdfHeader(doc, s, 'SATIS RAPORU', new Date().toLocaleDateString('tr-TR'));
  if (confB.length) {
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(37,99,235);
    doc.text('REZERVASYONLAR ('+confB.length+')', 14, 45);
    doc.autoTable({ startY:48,
      head:[['Rez.No','Musteri','Otel','Giris','Satis','Maliyet','Kar']],
      body:confB.map(b=>[pdfSafe(b.bookingNo),pdfSafe(b.customerName||'-'),pdfSafe(b.hotelName||'-'),fmtDate(b.checkIn),fmt(b.salePrice,b.currency),fmt(totalCost(b),b.currency),fmt(profit(b),b.currency)]),
      theme:'grid', headStyles:{fillColor:[37,99,235],font:'helvetica',fontSize:7.5,textColor:255,fontStyle:'bold'},
      bodyStyles:{fontSize:7.5,font:'helvetica'} });
  }
  if (confT.length) {
    const sy = confB.length ? doc.lastAutoTable.finalY+8 : 45;
    if (sy>240) doc.addPage();
    const ty = sy>240?20:sy;
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(37,99,235);
    doc.text('TURLAR ('+confT.length+')', 14, ty);
    doc.autoTable({ startY:ty+4,
      head:[['Tur Adi','Baslangic','Bitis','Katilimci','Satis','Maliyet','Kar']],
      body:confT.map(t=>[pdfSafe(t.tourName),fmtDate(t.startDate),fmtDate(t.endDate)||'-',String((t.participants||[]).length),fmt(t.salePrice||0,t.currency),fmt(tourTotalCost(t),t.currency),fmt(tourProfit(t),t.currency)]),
      theme:'grid', headStyles:{fillColor:[37,99,235],font:'helvetica',fontSize:7.5,textColor:255,fontStyle:'bold'},
      bodyStyles:{fontSize:7.5,font:'helvetica'} });
  }
  pdfFooter(doc, s);
  doc.save('SatisRaporu_'+new Date().toISOString().split('T')[0]+'.pdf');
  toast('Rapor PDF indirildi');
};

function attachToursHandlers() {
  document.getElementById('addCategoryBtn').addEventListener('click', () => openCategoryForm());
  document.getElementById('addTourBtn').addEventListener('click', () => openTourForm());
}

function openCategoryForm(cat = {}) {
  openModal(`
    <div class="p-6">
      <h2 class="text-xl font-bold mb-4">${cat.id ? 'Kategori Düzenle' : 'Yeni Kategori'}</h2>
      <form id="categoryForm" class="space-y-4">
        <div>
          <label class="label">Kategori Adı *</label>
          <input name="name" class="input" value="${cat.name || ''}" placeholder="Örn: Ege Turu, Avrupa Turu..." required>
        </div>
        <div>
          <label class="label">Tur Türü *</label>
          <select name="type" class="input">
            <option value="domestic" ${(cat.type||'domestic')==='domestic'?'selected':''}>🇹🇷 Yurt İçi</option>
            <option value="international" ${cat.type==='international'?'selected':''}>🌍 Yurt Dışı</option>
          </select>
        </div>
        <div class="flex justify-end gap-2 pt-4 border-t">
          <button type="button" class="btn-secondary" onclick="closeModal()">İptal</button>
          <button type="submit" class="btn-primary">Kaydet</button>
        </div>
      </form>
    </div>
  `);
  document.getElementById('categoryForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    const cats = DB.tourCategories();
    if (cat.id) {
      const idx = cats.findIndex(c => c.id === cat.id);
      cats[idx] = { ...cat, ...data };
    } else {
      cats.push({ id: uid(), ...data });
    }
    DB.saveTourCategories(cats);
    closeModal(); toast('Kategori kaydedildi'); render();
  });
}

window.editCategory = function(id) {
  const cat = DB.tourCategories().find(c => c.id === id);
  if (cat) openCategoryForm(cat);
};

window.deleteCategory = function(id) {
  const cat = DB.tourCategories().find(x => x.id === id);
  if (!confirm('⚠️ "' + (cat?.name||'bu kategori') + '" silinecek. Emin misiniz?')) return;
  if (!confirm('🔴 Geri alınamaz! Gerçekten silmek istiyor musunuz?')) return;
  DB.saveTourCategories(DB.tourCategories().filter(c => c.id !== id));
  toast('Kategori silindi'); render();
};

function openTourForm(t = {}) {
  const cats = DB.tourCategories();
  const tourCosts = t.costs || [{ label: 'Rehber ücreti', amount: 0 }];

  openModal(`
    <div class="p-6">
      <h2 class="text-xl font-bold mb-4">${t.id ? 'Tur Düzenle' : 'Yeni Tur'}</h2>
      <form id="tourForm" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="label">Tur Adı *</label>
            <input name="tourName" class="input" value="${t.tourName || ''}" required placeholder="Örn: Kapadokya 3 Gece Turu">
          </div>
          <div>
            <label class="label">Tur Türü *</label>
            <select name="tourType" class="input" id="tourTypeSelect">
              <option value="domestic" ${(t.tourType||'domestic')==='domestic'?'selected':''}>🇹🇷 Yurt İçi</option>
              <option value="international" ${t.tourType==='international'?'selected':''}>🌍 Yurt Dışı</option>
            </select>
          </div>
          <div>
            <label class="label">Kategori</label>
            <select name="categoryId" class="input">
              <option value="">-- Kategori Seçin --</option>
              ${cats.map(c => `<option value="${c.id}" ${t.categoryId===c.id?'selected':''}>${c.type==='domestic'?'🇹🇷':'🌍'} ${c.name}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="label">Başlangıç Tarihi</label>
            <input name="startDate" type="date" class="input" value="${t.startDate || ''}">
          </div>
          <div>
            <label class="label">Bitiş Tarihi</label>
            <input name="endDate" type="date" class="input" value="${t.endDate || ''}">
          </div>
          <div>
            <label class="label">Durum</label>
            <select name="status" class="input">
              <option value="pending" ${(t.status||'pending')==='pending'?'selected':''}>Beklemede</option>
              <option value="confirmed" ${t.status==='confirmed'?'selected':''}>Konfirme</option>
              <option value="cancelled" ${t.status==='cancelled'?'selected':''}>İptal</option>
            </select>
          </div>
          <div>
            <label class="label">Döviz</label>
            <select name="currency" id="tourCurrencySelect" class="input">
              <option value="TRY" ${(t.currency||'TRY')==='TRY'?'selected':''}>₺ TL</option>
              <option value="USD" ${t.currency==='USD'?'selected':''}>$ USD</option>
              <option value="EUR" ${t.currency==='EUR'?'selected':''}>€ EUR</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="label">💰 Satış Fiyatı (Müşteriden Alınan)</label>
            <input name="salePrice" type="number" step="0.01" id="tourSalePriceInp" class="input" value="${t.salePrice || 0}">
          </div>
          <div class="col-span-2">
            <label class="label">Notlar</label>
            <textarea name="notes" class="input" rows="2">${t.notes || ''}</textarea>
          </div>
        </div>

        <!-- Cost Items -->
        <div class="border-t pt-4">
          <div class="flex justify-between items-center mb-2">
            <label class="label mb-0">📋 Maliyet Kalemleri</label>
            <button type="button" onclick="addTourCostRow()" class="text-sm text-blue-600 hover:underline">+ Kalem Ekle</button>
          </div>
          <div id="tourCostRows" class="space-y-2">
            ${tourCosts.map((c, i) => tourCostRowHtml(c, i)).join('')}
          </div>
          <div class="flex justify-between mt-3 p-3 bg-slate-50 rounded-lg">
            <span class="font-medium text-sm">Toplam Maliyet:</span>
            <span id="tourTotalCostDisplay" class="font-bold text-red-600">${fmt(tourCosts.reduce((s,c)=>s+(parseFloat(c.amount)||0),0), t.currency||'TRY')}</span>
          </div>
          <div class="flex justify-between mt-2 p-3 bg-blue-50 rounded-lg">
            <span class="font-medium text-sm">Net Kâr:</span>
            <span id="tourNetProfitDisplay" class="font-bold text-blue-600">${fmt((t.salePrice||0) - tourCosts.reduce((s,c)=>s+(parseFloat(c.amount)||0),0), t.currency||'TRY')}</span>
          </div>
        </div>

        <div class="flex justify-end gap-2 pt-4 border-t">
          <button type="button" class="btn-secondary" onclick="closeModal()">İptal</button>
          <button type="submit" class="btn-primary">Kaydet</button>
        </div>
      </form>
    </div>
  `);

  const recalcTour = () => {
    const rows = document.querySelectorAll('.tour-cost-row');
    let total = 0;
    rows.forEach(r => { total += parseFloat(r.querySelector('[name^="tourCostAmount"]').value) || 0; });
    const sale = parseFloat(document.getElementById('tourSalePriceInp').value) || 0;
    const currency = document.getElementById('tourCurrencySelect').value || 'TRY';
    document.getElementById('tourTotalCostDisplay').textContent = fmt(total, currency);
    document.getElementById('tourNetProfitDisplay').textContent = fmt(sale - total, currency);
    document.getElementById('tourNetProfitDisplay').className = 'font-bold ' + ((sale - total) >= 0 ? 'text-blue-600' : 'text-red-600');
  };

  window.addTourCostRow = function() {
    const container = document.getElementById('tourCostRows');
    const idx = container.children.length;
    const div = document.createElement('div');
    div.innerHTML = tourCostRowHtml({ label: '', amount: 0 }, idx);
    container.appendChild(div.firstElementChild);
    attachTourCostListeners();
  };

  window.removeTourCostRow = function(btn) {
    btn.closest('.tour-cost-row').remove();
    recalcTour();
  };

  function attachTourCostListeners() {
    document.querySelectorAll('.tour-cost-row input').forEach(inp => { inp.oninput = recalcTour; });
  }
  attachTourCostListeners();
  document.getElementById('tourSalePriceInp').oninput = recalcTour;
  document.getElementById('tourCurrencySelect').onchange = recalcTour;

  document.getElementById('tourForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    const costRows = document.querySelectorAll('.tour-cost-row');
    const costs = [];
    costRows.forEach(r => {
      const label = r.querySelector('[name^="tourCostLabel"]').value.trim();
      const amount = parseFloat(r.querySelector('[name^="tourCostAmount"]').value) || 0;
      if (label) costs.push({ label, amount });
    });
    data.costs = costs;
    data.salePrice = parseFloat(data.salePrice) || 0;
    const tours = DB.tours();
    if (t.id) {
      const idx = tours.findIndex(x => x.id === t.id);
      tours[idx] = { ...t, ...data, participants: t.participants || [] };
    } else {
      tours.push({ id: uid(), ...data, participants: [], createdAt: new Date().toISOString() });
    }
    DB.saveTours(tours);
    closeModal(); toast('Tur kaydedildi'); render();
  });
}

  return `<div class="tour-cost-row grid grid-cols-[2fr_1fr_auto] gap-2 items-center">
    <input name="tourCostLabel${i}" class="input" placeholder="Açıklama (örn: Otel, Rehber, Ulaşım)" value="${c.label || ''}">
    <input name="tourCostAmount${i}" type="number" step="0.01" class="input" placeholder="0.00" value="${c.amount || 0}">
    <button type="button" onclick="removeTourCostRow(this)" class="text-red-500 hover:text-red-700 px-2 text-xl">✕</button>
  </div>`;
}

window.editTour = function(id) {
  const t = DB.tours().find(x => x.id === id);
  if (t) openTourForm(t);
};

window.deleteTour = function(id) {
  const t = DB.tours().find(x => x.id === id);
  if (!confirm('⚠️ "' + (t?.tourName||'bu tur') + '" silinecek. Emin misiniz?')) return;
  if (!confirm('🔴 Geri alınamaz! Gerçekten silmek istiyor musunuz?')) return;
  DB.saveTours(DB.tours().filter(t => t.id !== id));

window.manageTourParticipants = function(tourId) {

  const participants = t.participants || [];

  openModal(`
    <div class="p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">👥 Katılımcılar — ${t.tourName}</h2>
        <span class="badge ${t.tourType === 'domestic' ? 'badge-green' : 'badge-blue'}">${t.tourType === 'domestic' ? '🇹🇷 Yurt İçi' : '🌍 Yurt Dışı'}</span>

      <div id="participantList" class="space-y-3 mb-4 max-h-[50vh] overflow-y-auto pr-1">

          <button type="button" class="btn-secondary" onclick="closeModal()">Kapat</button>
          <button type="button" onclick="saveParticipants('${tourId}')" class="btn-primary">💾 Kaydet</button>

          <label class="label">TC Kimlik No</label>
          <input class="input p-tc" placeholder="12345678901" value="${p.tc || ''}" maxlength="11">

        </div>

          <label class="label">Pasaport No</label>

          <label class="label">Pasaport Geçerlilik Tarihi</label>
          <input type="date" class="input p-passexp" value="${p.passportExpiry || ''}">

            <option value="yes" ${p.visa==='yes'?'selected':''}>✅ Var</option>
            <option value="no" ${p.visa==='no'?'selected':''}>❌ Yok</option>
            <option value="pending" ${p.visa==='pending'?'selected':''}>⏳ Başvurulacak</option>

window.addParticipantRow = function(tourId, tourType) {
  const list = document.getElementById('participantList');
  const idx = list.querySelectorAll('.participant-card').length;
  // Remove empty state message if present
  const emptyMsg = list.querySelector('p');
  if (emptyMsg) emptyMsg.remove();
  const div = document.createElement('div');
  div.innerHTML = participantCardHtml({}, idx, tourType);
  list.appendChild(div.firstElementChild);
};

window.removeParticipantCard = function(btn) {
  const card = btn.closest('.participant-card');
  card.remove();
  // Re-number
  document.querySelectorAll('.participant-card').forEach((c, i) => {
    c.querySelector('.font-semibold').textContent = 'Katılımcı ' + (i+1);
    c.dataset.idx = i;
  });
};

window.saveParticipants = function(tourId) {
  const cards = document.querySelectorAll('.participant-card');
  const participants = [];
  cards.forEach(card => {
    const name = card.querySelector('.p-name').value.trim();
    if (!name) return;
    participants.push({
      name,
      tc: card.querySelector('.p-tc').value.trim(),
      birthDate: card.querySelector('.p-birth').value,
      phone: card.querySelector('.p-phone').value.trim(),
      passportNo: card.querySelector('.p-passport').value.trim(),
      passportExpiry: card.querySelector('.p-passexp').value,
      visa: card.querySelector('.p-visa').value,
      flight: card.querySelector('.p-flight').value,
    });
  });
  const tours = DB.tours();
  const idx = tours.findIndex(t => t.id === tourId);
  if (idx >= 0) {

window.exportParticipantsExcel = function(tourId) {
  const tours = DB.tours();
  const t = tours.find(x => x.id === tourId);
  if (!t) return;
  const participants = t.participants || [];

  const visaLabel = { 'yes': 'Var', 'no': 'Yok', 'pending': 'Başvurulacak', '': '-' };
  const flightLabel = { 'yes': 'İsteniyor', 'no': 'İstenmiyor', '': '-' };

  const headers = ['#', 'Ad Soyad', 'TC Kimlik No', 'Doğum Tarihi', 'Telefon', 'Pasaport No', 'Pasaport Geçerlilik', 'Vize', 'Uçak'];
  const rows = participants.map((p, i) => [
    i + 1,
    p.name || '',
    p.tc || '',
    p.birthDate ? new Date(p.birthDate).toLocaleDateString('tr-TR') : '',
    p.phone || '',
    p.passportNo || '',
    p.passportExpiry ? new Date(p.passportExpiry).toLocaleDateString('tr-TR') : '',
    visaLabel[p.visa] || '-',
    flightLabel[p.flight] || '-',
  ]);

  // Current state from modal if open
  const modalCards = document.querySelectorAll('.participant-card');
  const currentParticipants = [];
  if (modalCards.length > 0) {
    modalCards.forEach((card, i) => {
      const name = card.querySelector('.p-name').value.trim();
      if (!name) return;
      currentParticipants.push([
        i + 1,
        name,
        card.querySelector('.p-tc').value.trim(),
        card.querySelector('.p-birth').value ? new Date(card.querySelector('.p-birth').value).toLocaleDateString('tr-TR') : '',
        card.querySelector('.p-phone').value.trim(),
        card.querySelector('.p-passport').value.trim(),
        card.querySelector('.p-passexp').value ? new Date(card.querySelector('.p-passexp').value).toLocaleDateString('tr-TR') : '',
        visaLabel[card.querySelector('.p-visa').value] || '-',
        flightLabel[card.querySelector('.p-flight').value] || '-',
      ]);
    });
  }

  const finalRows = currentParticipants.length > 0 ? currentParticipants : rows;

  const wb = XLSX.utils.book_new();
  const wsData = [headers, ...finalRows];
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws['!cols'] = [
    { wch: 4 }, { wch: 25 }, { wch: 15 }, { wch: 14 }, { wch: 16 },
    { wch: 15 }, { wch: 18 }, { wch: 12 }, { wch: 14 }
  ];

  // Style header row
  headers.forEach((h, i) => {
    const cellRef = XLSX.utils.encode_cell({ r: 0, c: i });
    if (!ws[cellRef]) return;
    ws[cellRef].s = {
      font: { bold: true, color: { rgb: 'FFFFFF' } },
      fill: { fgColor: { rgb: '2563EB' } },
      alignment: { horizontal: 'center' }
    };
  });

  XLSX.utils.book_append_sheet(wb, ws, 'Katılımcı Listesi');

  // Tour info sheet
  const infoData = [
    ['Tur Adı', t.tourName],
    ['Tur Türü', t.tourType === 'domestic' ? 'Yurt İçi' : 'Yurt Dışı'],
    ['Başlangıç', t.startDate ? new Date(t.startDate).toLocaleDateString('tr-TR') : '-'],
    ['Bitiş', t.endDate ? new Date(t.endDate).toLocaleDateString('tr-TR') : '-'],
    ['Durum', t.status === 'confirmed' ? 'Konfirme' : t.status === 'cancelled' ? 'İptal' : 'Beklemede'],
    ['Toplam Katılımcı', finalRows.length],
    ['Oluşturulma', new Date().toLocaleDateString('tr-TR')],
  ];
  const wsInfo = XLSX.utils.aoa_to_sheet(infoData);
  wsInfo['!cols'] = [{ wch: 20 }, { wch: 30 }];
  XLSX.utils.book_append_sheet(wb, wsInfo, 'Tur Bilgileri');

  const fileName = 'KatilimciListesi_' + (t.tourName || 'Tur').replace(/\s+/g, '_') + '_' + new Date().toISOString().split('T')[0] + '.xlsx';
  XLSX.writeFile(wb, fileName);
  toast('Excel dosyası indirildi: ' + fileName);
};

// ============ EXPENSES (Genel Giderler) ============
function renderExpenses() {
  const expenses = DB.expenses();
  const s = DB.settings();
  const usdRate = parseFloat(s.usdRate)||32, eurRate = parseFloat(s.eurRate)||35;
  const toTLExp = (a,cur) => cur==='USD'?a*usdRate:cur==='EUR'?a*eurRate:a;
  const totalTL = expenses.reduce((s,e)=>s+toTLExp(parseFloat(e.amount)||0,e.currency||'TRY'),0);
  const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const thisMonth = new Date().getMonth(), thisYear = new Date().getFullYear();
  const monthlyExp = expenses.filter(e=>e.date&&new Date(e.date).getMonth()===thisMonth&&new Date(e.date).getFullYear()===thisYear);
  const monthlyTotal = monthlyExp.reduce((s,e)=>s+toTLExp(parseFloat(e.amount)||0,e.currency||'TRY'),0);

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px;">
      <h1 class="text-2xl font-bold text-slate-800">💸 Genel Giderler</h1>
      <div style="display:flex;gap:8px;">
        <button id="addExpenseBtn" class="btn-primary">+ Gider Ekle</button>
        <button onclick="exportExpensesExcel()" class="btn-success">📊 Excel</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px;">
      <div class="stat-card"><p style="font-size:12px;color:#64748b;">Toplam Gider (TL)</p><p style="font-size:24px;font-weight:700;color:#dc2626;">${fmt(totalTL)}</p></div>
      <div class="stat-card"><p style="font-size:12px;color:#64748b;">${months[thisMonth]} Gideri</p><p style="font-size:22px;font-weight:700;color:#f59e0b;">${fmt(monthlyTotal)}</p></div>
      <div class="stat-card"><p style="font-size:12px;color:#64748b;">Toplam Kalem</p><p style="font-size:24px;font-weight:700;">${expenses.length}</p></div>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
      <table class="data-table">
        <thead><tr><th>Tarih</th><th>Açıklama</th><th>Kategori</th><th>Tutar</th><th>Döviz</th><th>TL Karşılığı</th><th>İşlem</th></tr></thead>
        <tbody>
          ${expenses.length ? [...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e => `<tr>
            <td>${fmtDate(e.date)}</td>
            <td style="font-weight:500;">${e.description||'-'}</td>
            <td><span class="badge badge-yellow">${e.category||'Diğer'}</span></td>
            <td style="font-weight:600;color:#dc2626;">${new Intl.NumberFormat('tr-TR',{minimumFractionDigits:2}).format(parseFloat(e.amount)||0)}</td>
            <td>${e.currency||'TRY'}</td>
            <td style="color:#64748b;font-size:12px;">${e.currency!=='TRY'?fmt(toTLExp(parseFloat(e.amount)||0,e.currency||'TRY')):'-'}</td>
            <td><button onclick="editExpense('${e.id}')" class="text-blue-600 hover:underline text-sm mr-2">Düzenle</button><button onclick="deleteExpense('${e.id}')" class="text-red-600 hover:underline text-sm">Sil</button></td>
          </tr>`).join('') : '<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:28px;">Henüz gider eklenmemiş</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
}

function openExpenseForm(e={}) {
  openModal(`<div class="p-6">

    <form id="expenseForm" style="display:flex;flex-direction:column;gap:12px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">

        <div><label class="label">Kategori</label>
          <select name="category" class="input">
            ${EXPENSE_CATS.map(cat=>`<option ${e.category===cat?'selected':''}>${cat}</option>`).join('')}
          </select>
        </div>
        <div style="grid-column:1/-1;"><label class="label">Açıklama *</label><input name="description" class="input" value="${e.description||''}" required placeholder="Gider açıklaması"></div>

        <div><label class="label">Döviz</label>
          <select name="currency" class="input">
            <option value="TRY" ${(e.currency||'TRY')==='TRY'?'selected':''}>₺ TL</option>
            <option value="USD" ${e.currency==='USD'?'selected':''}>$ USD</option>
            <option value="EUR" ${e.currency==='EUR'?'selected':''}>€ EUR</option>
          </select>
        </div>
        <div style="grid-column:1/-1;"><label class="label">Not</label><input name="notes" class="input" value="${e.notes||''}" placeholder="Opsiyonel not"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:10px;border-top:1px solid #e2e8f0;">
        <button type="button" class="btn-secondary" onclick="closeModal()">İptal</button>
        <button type="submit" class="btn-primary">Kaydet</button>
      </div>
    </form>
  </div>`);
  document.getElementById('expenseForm').addEventListener('submit', ev => {
    ev.preventDefault();

    if (e.id) { const idx=expenses.findIndex(x=>x.id===e.id); expenses[idx]={...e,...data}; }

    DB.saveExpenses(expenses); closeModal(); toast('Gider kaydedildi'); render();
  });
}

window.editExpense = id => { const e=DB.expenses().find(x=>x.id===id); if(e) openExpenseForm(e); };
window.deleteExpense = id => {
  const e = DB.expenses().find(x=>x.id===id);

  if (!confirm('🔴 Geri alınamaz! Silmek istiyor musunuz?')) return;

};

window.exportExpensesExcel = function() {

  });
}

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span class="day-num-label" style="font-weight:600;font-size:13px;color:#2563eb;">Gün ${d.day||i+1}</span>
      <button type="button" onclick="removeDayRow(this)" style="color:#dc2626;background:none;border:none;cursor:pointer;font-size:16px;">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <input class="input day-title" placeholder="Gün başlığı (Örn: Istanbul Variş)" value="${d.title||''}">
