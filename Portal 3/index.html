window.downloadTourProgramPDF = function(id, lang) {
  lang = lang || 'tr';
  const p = DB.tourPrograms().find(x=>x.id===id);
  const s = DB.settings();
  if (!p) return;
  const L = {
    tr:{ daily:'GUNLUK PROGRAM', inc:'DAHIL SERVISLER', exc:'HARIC SERVISLER',
         notes:'NOTLAR', price:'Fiyat', dur:'Sure', day:'Gun', footer:'Iyi tatiller dileriz!' },
    en:{ daily:'DAILY ITINERARY', inc:'INCLUDED SERVICES', exc:'EXCLUDED SERVICES',
         notes:'NOTES', price:'Price', dur:'Duration', day:'Day', footer:'Have a great holiday!' }
  };
  const t = L[lang]||L.tr;
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  const meta = [p.duration?t.dur+': '+pdfSafe(p.duration):'', p.price?t.price+': '+pdfSafe(p.price):''].filter(Boolean).join('  |  ');
  pdfHeader(doc, s, pdfSafe(p.title||''), meta||null);
  let y = 44;

  // Summary
  if (p.summary) {
    const lines = pdfWrap(doc, p.summary, 176);
    doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(80,80,80);
    lines.forEach(l=>{ if(y>268){doc.addPage();y=20;} doc.text(l,14,y); y+=4.5; });
    y += 4;
  }

  // Daily program
  if ((p.days||[]).length) {
    if(y>260){doc.addPage();y=20;}
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(37,99,235);
    doc.text(t.daily, 14, y); y += 6;

    (p.days||[]).forEach(d => {
      if(y>260){doc.addPage();y=20;}
      // Day title with background bar
      doc.setFillColor(239,246,255);
      doc.rect(14, y-3.5, 182, 7.5, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(37,99,235);
      doc.text(t.day+' '+d.day+(d.title?': '+pdfSafe(d.title):''), 17, y+0.5);
      y += 9;

      // Description with word wrap
      if (d.description) {
        const clean = pdfSafe(d.description.replace(/<[^>]+>/g,''));
        const lines = doc.splitTextToSize(clean, 170);
        doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(55,55,55);
        lines.forEach(l=>{ if(y>268){doc.addPage();y=20;} doc.text(l,18,y); y+=4.5; });
      }

      // Day image (data URL only — base64 from file picker)
      if (d.image && d.image.startsWith('data:image')) {
        try {
          const isFmt = d.image.indexOf('data:image/png')>=0?'PNG':'JPEG';
          const imgH = 38;
          if(y+imgH>272){doc.addPage();y=20;}
          doc.addImage(d.image, isFmt, 18, y, 80, imgH);
          y += imgH + 4;
        } catch(e){ /* skip */ }
      }
      y += 4;
    });
  }

  // Included / Excluded two-column table
  const incLines = (p.included||'').split('\n').filter(Boolean).map(l=>pdfSafe(l.replace(/^[-•+]/,'').trim()));
  const excLines = (p.excluded||'').split('\n').filter(Boolean).map(l=>pdfSafe(l.replace(/^[-•]/,'').trim()));
  if (incLines.length||excLines.length) {
    if(y>240){doc.addPage();y=20;}
    const maxL = Math.max(incLines.length,excLines.length);
    const body = [];
    for(let i=0;i<maxL;i++) body.push([(incLines[i]?'+ '+incLines[i]:''),(excLines[i]?'- '+excLines[i]:'')]);
    doc.autoTable({ startY:y, head:[[t.inc,t.exc]], body,
      theme:'grid',
      headStyles:{fillColor:[37,99,235],textColor:255,fontSize:8.5,font:'helvetica',fontStyle:'bold'},
      bodyStyles:{fontSize:8,font:'helvetica'},
      columnStyles:{0:{cellWidth:88},1:{cellWidth:88}} });
    y = doc.lastAutoTable.finalY+6;
  }

  // Notes
  if (p.notes) {
    if(y>265){doc.addPage();y=20;}
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(120,53,14);
    doc.text(t.notes+':', 14, y); y+=4;
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(80,80,80);
    pdfWrap(doc,p.notes,176).forEach(l=>{ if(y>268){doc.addPage();y=20;} doc.text(l,14,y); y+=4.5; });
  }

  pdfFooter(doc, s);
  doc.save('TurProgrami_'+pdfSafe(p.title||'Program').replace(/\s+/g,'_')+'_'+lang.toUpperCase()+'.pdf');
  toast('Tur Programi PDF indirildi ('+lang.toUpperCase()+')');
};

window.manualSync = async function() {
  if (!window.GistCloud || !window.GistCloud.isConfigured()) {
    toast('Token girilmemi\u015f! Ayarlar sayfas\u0131na gidin.', 'error'); return;
  }
  toast('☁️ Gist\'ten senkronizasyon başladı...', 'info');
  try {
    await DB.syncFromCloud();
    toast('✅ Gist\'ten senkronize edildi!');
    render();
  } catch(e) {
    toast('Senkronizasyon hatası: ' + e.message, 'error');
  }
};

window.pushToCloud = async function() {
  if (!window.GistCloud || !window.GistCloud.isConfigured()) {
    toast('Token girilmemiş!', 'error'); return;
  }
  const allData = {
    customers: DB.customers(), bookings: DB.bookings(), tours: DB.tours(),
    tourCategories: DB.tourCategories(), settings: DB.settings(),
    expenses: DB.expenses(), tourPrograms: DB.tourPrograms(),
    savedAt: new Date().toISOString()
  };
  const ok = await window.GistCloud.save(allData);
  toast(ok ? '✅ Tüm veriler Gist\'e yüklendi!' : 'Yükleme hatası!', ok ? 'success' : 'error');
};

function attachSettingsHandlers() {
  document.getElementById('settingsForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    const current = DB.settings();
    DB.saveSettings({ ...current, ...data });
    toast('Ayarlar kaydedildi'); render();
  });

  // Exchange rates form
  const ratesForm = document.getElementById('ratesForm');
  if (ratesForm) {
    ratesForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      const current = DB.settings();
      DB.saveSettings({ ...current, usdRate: parseFloat(data.usdRate) || 32, eurRate: parseFloat(data.eurRate) || 35 });
      toast('Döviz kurları güncellendi');
    });
  }

  // Password change form
  const pwdForm = document.getElementById('passwordForm');
  if (pwdForm) {
    pwdForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const data = Object.fromEntries(fd);
      const msgEl = document.getElementById('pwdMsg');
      const selectedUser = document.getElementById('pwdUserSelect').value;
      const users = getUsers();

      const showMsg = (text, isError) => {
        msgEl.textContent = text;
        msgEl.className = isError
          ? 'text-sm p-2 rounded bg-red-50 text-red-600'
          : 'text-sm p-2 rounded bg-green-50 text-green-600';
        msgEl.classList.remove('hidden');
      };

      if (!users[selectedUser]) { showMsg('Kullanıcı bulunamadı!', true); return; }
      if (users[selectedUser].pass !== data.currentPass) { showMsg('Mevcut şifre yanlış!', true); return; }
      if (data.newPass !== data.newPass2) { showMsg('Yeni şifreler eşleşmiyor!', true); return; }
      if (data.newPass.length < 6) { showMsg('Şifre en az 6 karakter olmalıdır!', true); return; }

      users[selectedUser].pass = data.newPass;
      saveUsers(users);
      showMsg('✅ Şifre başarıyla değiştirildi!', false);
      e.target.reset();
      toast('Şifre değiştirildi!');
    });
  }

  document.getElementById('logoUpload').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const s = DB.settings();
      DB.saveSettings({ ...s, agencyLogo: ev.target.result });
      toast('Logo yüklendi'); render();
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('importFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.customers) DB.saveCustomers(data.customers);
        if (data.bookings) DB.saveBookings(data.bookings);
        if (data.tours) DB.saveTours(data.tours);
        if (data.tourCategories) DB.saveTourCategories(data.tourCategories);
        if (data.settings) DB.saveSettings(data.settings);
        toast('Veri başarıyla yüklendi'); render();
      } catch (err) { toast('Geçersiz dosya!', 'error'); }
    };
    reader.readAsText(file);
  });
}

window.clearLogo = function() {
  const s = DB.settings();
  DB.saveSettings({ ...s, agencyLogo: '' });
  render();
};

window.exportAllData = function() {
  const data = {
    customers: DB.customers(),
    bookings: DB.bookings(),
    tours: DB.tours(),
    tourCategories: DB.tourCategories(),
    settings: DB.settings(),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'acente_yedek_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  toast('Yedek dosyası indirildi');
};

window.importDataBtn = function() {
  document.getElementById('importFile').click();
};

window.clearAllData = function() {
  if (!confirm('🔴 TÜM verileri silmek istediğinize EMİN misiniz? Bu işlem GERİ ALINAMAZ!')) return;
  if (!confirm('⛔ Son uyarı! Müşteriler, rezervasyonlar, turlar, HERŞEY silinecek. Devam?')) return;
  const confirmText = prompt('Silme işlemini onaylamak için "SİL" yazın:');
  if (confirmText !== 'SİL') { toast('Silme iptal edildi'); return; }
  ['customers','bookings','tours','tourCategories','expenses','tourPrograms'].forEach(k => localStorage.removeItem('ap_'+k));
  toast('Tüm veriler silindi'); render();
};
